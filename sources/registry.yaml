    notes: 'Specialist 2026-07-19: nestle.com sits behind an Akamai/WAF bot filter that
      returns HTTP 403 to the monitor''s non-browser User-Agent on ALL HTML and RSS
      endpoints - /media/news, /media/pressreleases, /info/rsslinkpage and every /rss
      or /feed variant tried, including individual article pages. Only robots.txt and
      sitemap.xml (static XML) are served (200); the sitemap lists /media/news/* URLs
      but the article bodies themselves 403. Retrieving content would require
      impersonating a browser (prohibited anti-bot bypass); a headless browser would
      also face the same bot detection. No public feed/API exists.'
  monitoring_focus: 'Direct competitor: coffee, FMCG, pricing, supply chain, M&A and ESG news with EU/EEA relevance.'
  categories: &id001
  - competitors_direct
  trust_tier: corporate
  status: unresolved
  exclusion_reason: 'Anti-bot WAF (Akamai): HTTP 403 to the monitoring User-Agent on all
    HTML/RSS/API endpoints; only robots.txt and sitemap.xml are reachable but article
    bodies are blocked. No public feed. Not bypassable without prohibited browser
    impersonation. Revisit if Nestle exposes a public feed or a non-WAF newsroom mirror.'
  origin: pdf_inventar
